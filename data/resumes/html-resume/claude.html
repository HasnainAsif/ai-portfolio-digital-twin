<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasnain Asif — Resume</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      @page {
        size: A4;
        margin: 14mm 0;
      }

      @page :first {
        margin-top: 0;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --blue-deep: #0f4c81;
        --blue-mid: #1a6db5;
        --blue-light: #d6e8f8;
        --blue-pale: #f0f7ff;
        --ink: #111827;
        --ink-mid: #374151;
        --ink-soft: #6b7280;
        --ink-ghost: #9ca3af;
        --rule: #e2eaf4;
        --white: #ffffff;
        --page-bg: #f8fafd;
      }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--page-bg);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .page {
        max-width: 820px;
        margin: 40px auto;
        background: var(--white);
        box-shadow:
          0 4px 32px rgba(15, 76, 129, 0.1),
          0 1px 4px rgba(0, 0, 0, 0.06);
        border-radius: 10px;
        overflow: hidden;
      }

      /* ── HEADER ── */
      .header {
        background: #ffffff;
        padding: 32px 44px;
        display: flex;
        align-items: center;
      }

      .header-left {
        flex: 1;
        padding-right: 36px;
      }

      .header-name {
        font-family: 'Playfair Display', serif;
        font-size: 40px;
        font-weight: 700;
        font-style: italic;
        color: #0f4c81;
        letter-spacing: -0.5px;
        line-height: 1.05;
        margin-bottom: 10px;
      }

      .header-rule {
        width: 36px;
        height: 2px;
        background: #1a6db5;
        margin-bottom: 10px;
      }

      .header-title {
        font-family: 'DM Mono', monospace;
        font-size: 10.5px;
        color: #6b7280;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
      }

      .header-title-sep {
        color: #d6e8f8;
        font-size: 12px;
      }

      .header-divider {
        width: 1px;
        height: 72px;
        background: #e2eaf4;
        flex-shrink: 0;
      }

      .header-right {
        padding-left: 36px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .contact-line {
        font-family: 'DM Mono', monospace;
        font-size: 10.5px;
        color: #374151;
        text-decoration: none;
        line-height: 1.5;
        display: flex;
        align-items: center;
        gap: 7px;
        transition: color 0.15s;
      }

      .contact-line:hover {
        color: #1a6db5;
      }

      .contact-line svg {
        width: 10px;
        height: 10px;
        fill: #9ca3af;
        flex-shrink: 0;
      }

      /* ── BODY ── */
      .body {
        padding: 24px 44px 32px;
      }

      /* ── SECTION ── */
      .section {
        margin-bottom: 20px;
        /* page-break-inside: avoid; */
      }

      .section-title {
        font-size: 10.5px;
        font-weight: 600;
        color: var(--blue-mid);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        break-after: avoid;
        page-break-after: avoid;
      }

      .section-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--rule);
      }

      /* ── SUMMARY ── */
      .summary-text {
        font-size: 13.5px;
        color: var(--ink-mid);
        line-height: 1.75;
        border-left: 2.5px solid var(--blue-light);
        padding-left: 14px;
        background: var(--blue-pale);
        border-radius: 0 6px 6px 0;
        padding: 12px 14px;
      }

      /* ── SKILLS ── */
      .skills-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .skill-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .skill-category {
        font-size: 11.5px;
        font-weight: 600;
        color: var(--ink);
        min-width: 110px;
        padding-top: 2px;
      }

      .skill-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      .skill-tag {
        font-size: 11.5px;
        padding: 2px 9px;
        background: var(--blue-pale);
        color: var(--blue-deep);
        border: 0.5px solid var(--blue-light);
        border-radius: 4px;
        font-weight: 400;
      }

      /* ── EXPERIENCE ── */
      .exp-item {
        position: relative;
        padding-left: 18px;
        margin-bottom: 14px;
        page-break-inside: avoid;
      }

      .exp-item::before {
        content: '';
        position: absolute;
        left: 0;
        top: 7px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--blue-mid);
        border: 1.5px solid var(--white);
        box-shadow: 0 0 0 1.5px var(--blue-mid);
      }

      .exp-item + .exp-item::after {
        content: '';
        position: absolute;
        left: 3px;
        bottom: calc(100% + 4px);
        width: 1px;
        height: 16px;
        background: var(--rule);
      }

      .exp-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1px;
        gap: 12px;
      }

      .exp-role {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
      }

      .exp-date {
        font-size: 11.5px;
        color: var(--ink-ghost);
        font-family: 'DM Mono', monospace;
        white-space: nowrap;
        padding-top: 2px;
      }

      .exp-company {
        font-size: 12.5px;
        color: var(--blue-mid);
        font-weight: 500;
        margin-bottom: 7px;
      }

      .exp-subtitle,
      .project-desc {
        font-size: 12.5px;
        color: var(--ink-soft);
        font-style: italic;
        margin-bottom: 8px;
        line-height: 1.6;
      }

      .exp-bullets {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .exp-bullets li {
        font-size: 12.5px;
        color: var(--ink-mid);
        line-height: 1.6;
        display: flex;
        gap: 7px;
      }

      .exp-bullets li::before {
        content: '—';
        color: var(--blue-light);
        font-weight: 600;
        flex-shrink: 0;
        margin-top: 1px;
      }

      /* ── PROJECTS ── */
      .project-item {
        margin-bottom: 10px;
        padding: 14px 16px;
        border: 1px solid var(--rule);
        border-radius: 8px;
        background: #fff;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        page-break-inside: avoid;
      }

      .project-item:hover {
        border-color: var(--blue-light);
        box-shadow: 0 2px 12px rgba(15, 76, 129, 0.07);
      }

      .project-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 4px;
      }

      .project-name {
        font-size: 13.5px;
        font-weight: 600;
        color: var(--ink);
      }

      .project-stack {
        font-size: 10.5px;
        color: var(--ink-ghost);
        font-family: 'DM Mono', monospace;
        text-align: right;
        line-height: 1.5;
      }
      /*
      .project-desc {
        font-size: 12.5px;
        color: var(--ink-mid);
        line-height: 1.6;
      } */

      .project-bullets {
        list-style: none;
        margin-top: 6px;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .project-bullets li {
        font-size: 12px;
        color: var(--ink-mid);
        display: flex;
        gap: 7px;
      }

      .project-bullets li::before {
        content: '·';
        color: var(--blue-mid);
        font-weight: 700;
        font-size: 14px;
        flex-shrink: 0;
        line-height: 1.4;
      }

      /* ── TWO-COL ── */
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0 32px;
      }

      /* ── EDUCATION ── */
      .edu-item {
        margin-bottom: 10px;
      }

      .edu-degree {
        font-size: 13px;
        font-weight: 600;
        color: var(--ink);
      }

      .edu-school {
        font-size: 12.5px;
        color: var(--blue-mid);
        font-weight: 500;
      }

      .edu-location {
        font-size: 11.5px;
        color: var(--ink-ghost);
        font-family: 'DM Mono', monospace;
      }

      /* ── CERTS ── */
      .cert-item {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        margin-bottom: 8px;
      }

      .cert-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--blue-mid);
        flex-shrink: 0;
        margin-top: 5px;
      }

      .cert-name {
        font-size: 12.5px;
        font-weight: 500;
        color: var(--ink);
        line-height: 1.4;
      }

      .cert-issuer {
        font-size: 11.5px;
        color: var(--ink-ghost);
      }

      /* ── ACHIEVEMENTS ── */
      .achievement-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .achievement-item {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        background: var(--blue-pale);
        border: 0.5px solid var(--blue-light);
        border-radius: 7px;
        padding: 10px 14px;
      }

      .achievement-icon {
        font-size: 16px;
        flex-shrink: 0;
        line-height: 1.4;
      }

      .achievement-text {
        font-size: 12.5px;
        color: var(--ink-mid);
        line-height: 1.6;
      }

      .achievement-text strong {
        color: var(--blue-deep);
        font-weight: 600;
      }

      /* ── PRINT ── */
      @media print {
        body {
          background: #fff;
        }
        .page {
          margin: 0;
          box-shadow: none;
          border-radius: 0;
        }
        .project-item:hover {
          box-shadow: none;
        }
      }

      @media (max-width: 640px) {
        .header {
          padding: 24px 20px;
          flex-direction: column;
          align-items: flex-start;
          gap: 20px;
        }
        .header-left {
          padding-right: 0;
        }
        .header-divider {
          width: 36px;
          height: 1px;
        }
        .header-right {
          padding-left: 0;
        }
        .header-name {
          font-size: 28px;
        }
        .body {
          padding: 24px 20px 32px;
        }
        .two-col {
          grid-template-columns: 1fr;
        }
        .exp-header {
          flex-direction: column;
          gap: 2px;
        }
        .project-header {
          flex-direction: column;
          gap: 2px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page" id="resume-page"></div>

    <script src="resume-data.js"></script>
    <script>
      const svgPaths = {
        email:    `<path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>`,
        phone:    `<path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"/>`,
        linkedin: `<path fill-rule="evenodd" d="M16.338 16.338H13.67V12.16c0-.995-.017-2.277-1.387-2.277-1.39 0-1.601 1.086-1.601 2.207v4.248H8.014V7.99h2.558v1.17h.037c.356-.675 1.227-1.387 2.526-1.387 2.703 0 3.203 1.779 3.203 4.092v4.473zM5.005 6.818a1.493 1.493 0 110-2.986 1.493 1.493 0 010 2.986zm1.337 9.52H3.667V7.99h2.675v8.348zM17.668 1H2.328C1.595 1 1 1.581 1 2.298v15.403C1 18.418 1.595 19 2.328 19h15.34c.734 0 1.332-.582 1.332-1.299V2.298C19 1.581 18.402 1 17.668 1z" clip-rule="evenodd"/>`,
        github:   `<path fill-rule="evenodd" d="M10 0C4.477 0 0 4.477 0 10c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.605-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0110 4.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C17.138 18.163 20 14.418 20 10c0-5.523-4.477-10-10-10z" clip-rule="evenodd"/>`,
        website:  `<path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/>`,
        location: `<path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>`
      };

      function icon(type) {
        return `<svg viewBox="0 0 20 20">${svgPaths[type]}</svg>`;
      }

      function renderContact(items) {
        return items.map(item => {
          const svg = icon(item.type);
          if (item.href) {
            const target = item.href.startsWith('http') ? ' target="_blank"' : '';
            return `<a class="contact-line" href="${item.href}"${target}>${svg}${item.label}</a>`;
          }
          return `<span class="contact-line">${svg}${item.label}</span>`;
        }).join('\n          ');
      }

      function renderHeader(data) {
        const titles = data.titles.map((t, i) =>
          i < data.titles.length - 1
            ? `<span>${t}</span>\n            <span class="header-title-sep">&middot;</span>`
            : `<span>${t}</span>`
        ).join('\n            ');

        return `
      <!-- HEADER -->
      <div class="header">
        <div class="header-left">
          <div class="header-name">${data.name}</div>
          <div class="header-rule"></div>
          <div class="header-title">
            ${titles}
          </div>
        </div>
        <div class="header-divider"></div>
        <div class="header-right">
          ${renderContact(data.contact)}
        </div>
      </div>`;
      }

      function renderSkills(skills) {
        return skills.map(row => `
            <div class="skill-row">
              <div class="skill-category">${row.category}</div>
              <div class="skill-tags">
                ${row.tags.map(t => `<span class="skill-tag">${t}</span>`).join('\n                ')}
              </div>
            </div>`).join('');
      }

      function renderExperience(experience) {
        return experience.map(exp => `
          <div class="exp-item">
            <div class="exp-header">
              <div class="exp-role">${exp.role}</div>
              <div class="exp-date">${exp.date}</div>
            </div>
            <div class="exp-company">${exp.company}</div>
            <div class="exp-subtitle">${exp.subtitle}</div>
            <ul class="exp-bullets">
              ${exp.bullets.map(b => `<li>${b}</li>`).join('\n              ')}
            </ul>
          </div>`).join('\n');
      }

      function renderProjectItem(p) {
        return `<div class="project-item">
            <div class="project-header">
              <div class="project-name">${p.name}</div>
              <div class="project-stack">${p.stack}</div>
            </div>
            <div class="project-desc">${p.desc}</div>
            <ul class="project-bullets">
              ${p.bullets.map(b => `<li>${b}</li>`).join('\n              ')}
            </ul>
          </div>`;
      }

      function renderProjects(projects) {
        return projects.map(p =>
          p.active
            ? `\n          ${renderProjectItem(p)}`
            : `\n          <!-- ${renderProjectItem(p)} -->`
        ).join('\n');
      }

      function renderEducation(education) {
        return education.map(e => `
          <div class="edu-item">
            <div class="edu-degree">${e.degree}</div>
            <div class="edu-school">${e.school}</div>
            <div class="edu-location">${e.location}</div>
          </div>`).join('');
      }

      function renderCertifications(certs) {
        return certs.map(c => `
          <div class="cert-item">
            <div class="cert-dot"></div>
            <div>
              <div class="cert-name">${c.name}</div>
              <div class="cert-issuer">${c.issuer}</div>
            </div>
          </div>`).join('');
      }

      function renderAchievements(achievements) {
        const inner = `
        <div class="section">
          <div class="section-title">Key Achievements</div>
          <div class="achievement-list">
            ${achievements.items.map(a => `<div class="achievement-item">
              <div class="achievement-icon">${a.icon}</div>
              <div class="achievement-text"><strong>${a.strong}</strong> ${a.text}</div>
            </div>`).join('\n            ')}
          </div>
        </div>`;

        return achievements.active ? inner : `<!-- ${inner} -->`;
      }

      function render(data) {
        const atsText = data.contact.map(c => c.label).join(' | ');

        document.getElementById('resume-page').innerHTML = `
      ${renderHeader(data)}

      <!-- Fallback - For ATS Parsing -->
      <div style="display: none">${atsText}</div>

      <!-- ATS-safe divider -->
      <div style="height: 3px; background: #1a6db5"></div>

      <!-- BODY -->
      <div class="body">
        <!-- SUMMARY -->
        <div class="section">
          <div class="section-title">Professional Summary</div>
          <div class="summary-text">${data.summary}</div>
        </div>

        <!-- SKILLS -->
        <div class="section">
          <div class="section-title">Technical Skills</div>
          <div class="skills-grid">${renderSkills(data.skills)}
          </div>
        </div>

        <!-- EXPERIENCE -->
        <div class="section">
          <div class="section-title">Experience</div>
          ${renderExperience(data.experience)}
        </div>

        <!-- PROJECTS -->
        <div class="section">
          <div class="section-title">Projects</div>
          ${renderProjects(data.projects)}
        </div>

        <!-- EDUCATION + CERTS -->
        <!-- <div class="two-col"> -->
        <div class="section">
          <div class="section-title">Education</div>
          ${renderEducation(data.education)}
        </div>

        <div class="section">
          <div class="section-title">Certifications</div>
          ${renderCertifications(data.certifications)}
        </div>
        <!-- </div> -->

        <!-- KEY ACHIEVEMENTS -->
        ${renderAchievements(data.achievements)}
      </div>`;
      }

      render(resumeData);
    </script>
  </body>
</html>
